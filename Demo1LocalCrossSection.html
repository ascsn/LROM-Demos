
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cross Section Explorer with L-ROM</title>
<style>
  :root {
    --ink: #111827;
    --muted: #6b7280;
    --line: #d1d5db;
    --blue: #1d4ed8;
    --green: #047857;
    --paper: #ffffff;
    --soft: #f8fafc;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--paper);
    color: var(--ink);
  }
  main {
    width: min(1500px, calc(100vw - 44px));
    margin: 24px auto 42px;
  }
  header {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 24px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 16px;
    margin-bottom: 20px;
  }
  h1 {
    margin: 0;
    font-size: 34px;
    font-weight: 760;
    letter-spacing: 0;
  }
  .subtitle {
    margin-top: 6px;
    color: var(--muted);
    font-size: 14px;
  }
  .summary {
    display: grid;
    grid-template-columns: minmax(250px, 1fr);
    gap: 8px;
    min-width: 280px;
  }
  .summary div {
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px 12px;
    background: var(--soft);
  }
  .summary span {
    display: block;
    color: var(--muted);
    font-size: 15px;
    margin-bottom: 5px;
  }
  .summary strong {
    font-size: 28px;
  }
  .layout {
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 22px;
    align-items: start;
  }
  .panel {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fff;
  }
  .controls {
    padding: 14px 14px 10px;
  }
  .control {
    padding: 10px 0 12px;
    border-bottom: 1px solid #eef2f7;
  }
  .control:last-child { border-bottom: none; }
  .row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 7px;
  }
  label {
    font-weight: 650;
    font-size: 14px;
  }
  output {
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    color: #1f2937;
  }
  input[type="range"] {
    width: 100%;
    accent-color: var(--blue);
  }
  .limits {
    display: flex;
    justify-content: space-between;
    color: var(--muted);
    font-size: 11px;
    font-variant-numeric: tabular-nums;
  }
  .buttons {
    display: flex;
    gap: 8px;
    padding: 0 14px 14px;
  }
  button {
    border: 1px solid #cbd5e1;
    background: #fff;
    color: var(--ink);
    border-radius: 7px;
    padding: 8px 11px;
    font-weight: 650;
    cursor: pointer;
  }
  button:hover { background: #f1f5f9; }
  .plot-card {
    padding: 12px;
  }
  svg {
    display: block;
    width: 100%;
    height: min(74vh, 760px);
    min-height: 520px;
  }
  .axis text {
    fill: #374151;
    font-size: 13px;
  }
  .axis path, .axis line, .grid line {
    stroke: #cbd5e1;
    stroke-width: 1;
  }
  .grid line { opacity: 0.7; }
  .curve {
    fill: none;
    stroke: #111827;
    stroke-width: 4.6;
  }
  .reference {
    fill: none;
    stroke: #2563eb;
    stroke-width: 3;
    stroke-dasharray: 7 5;
    opacity: 0.75;
  }
  .legend-box, .inset-box {
    fill: #ffffff;
    stroke: #cbd5e1;
    stroke-width: 1;
    opacity: 0.96;
  }
  .train-band {
    fill: #eff6ff;
    opacity: 0.95;
  }
  .caption {
    color: var(--muted);
    font-size: 13px;
    padding: 0 8px 8px;
  }
  @media (max-width: 980px) {
    header, .layout { display: block; }
    .summary { min-width: 0; margin-top: 16px; }
    .panel { margin-bottom: 18px; }
  }
</style>
</head>
<body>
<main>
  <header>
    <div>
      <h1>Cross Section Explorer with L-ROM</h1>
      <div class="subtitle">40Ca(n,n), fixed energy, <span id="modelTag"></span>. Move the sliders to update the L-ROM cross section in the browser.</div>
    </div>
    <div class="summary">
      <div><span>Angle-integrated elastic cross section</span><strong id="integratedValue">-</strong></div>
    </div>
  </header>
  <div class="layout">
    <section class="panel">
      <div class="controls" id="controls"></div>
      <div class="buttons">
        <button id="resetButton">Reset Center</button>
        <button id="randomButton">Random Point</button>
      </div>
    </section>
    <section class="panel plot-card">
      <svg id="plot" viewBox="0 0 1040 680" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="caption">Y axis is logarithmic. The inset shows the scaled local optical-potential terms for l=1, ch=0.</div>
    </section>
  </div>
</main>

const C = {
  add: (a,b) => [a[0] + b[0], a[1] + b[1]],
  sub: (a,b) => [a[0] - b[0], a[1] - b[1]],
  mul: (a,b) => [a[0] * b[0] - a[1] * b[1], a[0] * b[1] + a[1] * b[0]],
  div: (a,b) => {
    const d = b[0] * b[0] + b[1] * b[1];
    return [(a[0] * b[0] + a[1] * b[1]) / d, (a[1] * b[0] - a[0] * b[1]) / d];
  },
  scale: (a,s) => [a[0] * s, a[1] * s],
  abs2: (a) => a[0] * a[0] + a[1] * a[1],
};

function z(obj, ...idx) {
  let re = obj.re, im = obj.im;
  for (const i of idx) { re = re[i]; im = im[i]; }
  return [re, im];
}

function woodsSaxon(r, R, a) {
  const x = Math.max(-700, Math.min(700, (r - R) / a));
  return 1 / (1 + Math.exp(x));
}

function woodsSaxonPrime(r, R, a) {
  const x = Math.max(-700, Math.min(700, (r - R) / a));
  const ex = Math.exp(x);
  const denom = 1 + ex;
  return -(ex / a) / (denom * denom);
}

function thomas(r, R, a) {
  return woodsSaxonPrime(r, R, a) / Math.max(r, 1e-12);
}

function directTilde(alpha, s, ell, ch) {
  const [vv, wv, wd, vso, rv, rd, rso, av, ad, aso] = alpha;
  const r = s / MODEL.k_fixed;
  const fVol = woodsSaxon(r, rv, av);
  const fpSurf = woodsSaxonPrime(r, rd, ad);
  const th = thomas(r, rso, aso);
  const lds = ell === 0 ? 0 : (ch === 0 ? ell : -(ell + 1));
  const spinRe = lds * vso / (MODEL.mass_pion * MODEL.mass_pion) * th;
  const spinIm = lds * MODEL.wso_fixed / (MODEL.mass_pion * MODEL.mass_pion) * th;
  const re = (-vv * fVol + spinRe) / MODEL.e_com;
  const im = (wv * fVol - 4 * ad * wd * fpSurf + spinIm) / MODEL.e_com;
  return [re, im];
}

function solveComplex(A, b) {
  const n = b.length;
  const M = A.map((row, i) => row.map(v => [v[0], v[1]]).concat([[b[i][0], b[i][1]]]));
  for (let k = 0; k < n; k++) {
    let pivot = k, best = C.abs2(M[k][k]);
    for (let i = k + 1; i < n; i++) {
      const score = C.abs2(M[i][k]);
      if (score > best) { best = score; pivot = i; }
    }
    if (pivot !== k) [M[k], M[pivot]] = [M[pivot], M[k]];
    const diag = M[k][k];
    for (let j = k; j <= n; j++) M[k][j] = C.div(M[k][j], diag);
    for (let i = 0; i < n; i++) {
      if (i === k) continue;
      const factor = M[i][k];
      if (C.abs2(factor) === 0) continue;
      for (let j = k; j <= n; j++) M[i][j] = C.sub(M[i][j], C.mul(factor, M[k][j]));
    }
  }
  return M.map(row => row[n]);
}

function channelCoefficients(alpha, cidx) {
  const nPhi = MODEL.n_phi;
  const nFeat = MODEL.K + 1;
  const features = new Array(nFeat);
  features[0] = [1, 0];
  for (let f = 1; f < nFeat; f++) {
    const raw = directTilde(alpha, MODEL.s_points[cidx][f - 1], MODEL.ell[cidx], MODEL.ch[cidx]);
    const center = z(MODEL.center, cidx, f - 1);
    features[f] = C.scale(C.sub(raw, center), 1 / MODEL.scale[cidx][f - 1]);
  }
  const A = Array.from({length: nPhi}, () => Array.from({length: nPhi}, () => [0, 0]));
  const b = Array.from({length: nPhi}, () => [0, 0]);
  for (let f = 0; f < nFeat; f++) {
    for (let i = 0; i < nPhi; i++) {
      b[i] = C.add(b[i], C.mul(features[f], z(MODEL.vectors, cidx, f, i)));
      for (let j = 0; j < nPhi; j++) {
        A[i][j] = C.add(A[i][j], C.mul(features[f], z(MODEL.matrices, cidx, f, i, j)));
      }
    }
  }
  return solveComplex(A, b);
}

function smatrix(alpha) {
  const nChannels = MODEL.ell.length;
  const splus = Array.from({length: MODEL.n_l}, () => [0, 0]);
  const sminus = Array.from({length: MODEL.n_l}, () => [0, 0]);
  for (let cidx = 0; cidx < nChannels; cidx++) {
    const coeffs = channelCoefficients(alpha, cidx);
    const x = [[1, 0]].concat(coeffs);
    let phi = [0, 0], dphi = [0, 0];
    for (let j = 0; j < x.length; j++) {
      phi = C.add(phi, C.mul(x[j], z(MODEL.asym_vals, cidx, j)));
      dphi = C.add(dphi, C.mul(x[j], z(MODEL.asym_ders, cidx, j)));
    }
    const rmat = C.div(phi, C.scale(dphi, MODEL.s0[cidx]));
    const top = C.sub(z(MODEL.hm, cidx), C.scale(C.mul(rmat, z(MODEL.hmp, cidx)), MODEL.s0[cidx]));
    const bot = C.sub(z(MODEL.hp, cidx), C.scale(C.mul(rmat, z(MODEL.hpp, cidx)), MODEL.s0[cidx]));
    const s = C.div(top, bot);
    const ell = MODEL.ell[cidx], ch = MODEL.ch[cidx];
    if (ch === 0) {
      splus[ell] = s;
      if (ell === 0) sminus[ell] = s;
    } else {
      sminus[ell] = s;
    }
  }
  return {splus, sminus};
}

function crossSection(alpha) {
  const {splus, sminus} = smatrix(alpha);
  const out = [];
  for (let aidx = 0; aidx < MODEL.angles_deg.length; aidx++) {
    let ampA = [0, 0], ampB = [0, 0];
    for (let ell = 0; ell < MODEL.n_l; ell++) {
      const spMinusOne = C.sub(splus[ell], [1, 0]);
      const smMinusOne = C.sub(sminus[ell], [1, 0]);
      const spinAvg = C.add(C.scale(spMinusOne, ell + 1), C.scale(smMinusOne, ell));
      const spinFlip = C.sub(splus[ell], sminus[ell]);
      const prefA = MODEL.p_l[ell][aidx] / (2 * MODEL.k_fixed);
      const prefB = MODEL.p1_l[ell][aidx] / (2 * MODEL.k_fixed);
      ampA = C.add(ampA, C.mul(spinAvg, [0, -prefA]));
      ampB = C.add(ampB, C.mul(spinFlip, [0, -prefB]));
    }
    out.push((C.abs2(ampA) + C.abs2(ampB)) * 10);
  }
  return out;
}

function integratedCrossSection(values) {
  // sigma_el = 2 pi integral_0^pi sin(theta) [d sigma / d Omega] d theta.
  // The integrand vanishes at both endpoints, so the browser-side
  // trapezoidal rule remains well behaved even though the stored angular
  // grid starts just above zero and ends just below pi.
  let integral = 0;
  let thetaPrev = 0;
  let weightedPrev = 0;
  for (let i = 0; i < MODEL.angles_deg.length; i++) {
    const theta = MODEL.angles_deg[i] * Math.PI / 180;
    const weighted = Math.sin(theta) * values[i];
    integral += 0.5 * (weightedPrev + weighted) * (theta - thetaPrev);
    thetaPrev = theta;
    weightedPrev = weighted;
  }
  integral += 0.5 * weightedPrev * (Math.PI - thetaPrev);
  return 2 * Math.PI * integral;
}

function opticalPotentialTerms(alpha) {
  const [vv, wv, wd, vso, rv, rd, rso, av, ad, aso] = alpha;
  const r = Array.from({length: 141}, (_, i) => 10 * i / 140);
  const terms = [
    {label: "real volume", color: "#2563eb", dash: "", scale: 1, values: []},
    {label: "imag volume x10", color: "#dc2626", dash: "7 4", scale: 10, values: []},
    {label: "imag surface x3", color: "#f97316", dash: "3 3", scale: 3, values: []},
    {label: "real spin-orbit x25", color: "#16a34a", dash: "8 3 2 3", scale: 25, values: []},
  ];
  for (const rr of r) {
    const fVol = woodsSaxon(rr, rv, av);
    const fpSurf = woodsSaxonPrime(rr, rd, ad);
    const spin = vso / (MODEL.mass_pion * MODEL.mass_pion) * thomas(rr, rso, aso);
    terms[0].values.push((-vv * fVol) * terms[0].scale);
    terms[1].values.push((wv * fVol) * terms[1].scale);
    terms[2].values.push((-4 * ad * wd * fpSurf) * terms[2].scale);
    terms[3].values.push(spin * terms[3].scale);
  }
  return {r, terms};
}

const controls = document.getElementById("controls");
const sliders = [];
for (let i = 0; i < MODEL.parameter_names.length; i++) {
  const originalSpan = MODEL.upper[i] - MODEL.lower[i];
  const displayLower = MODEL.lower[i] - 0.1 * originalSpan;
  const displayUpper = MODEL.upper[i] + 0.1 * originalSpan;
  const wrap = document.createElement("div");
  wrap.className = "control";
  const row = document.createElement("div");
  row.className = "row";
  const label = document.createElement("label");
  label.textContent = MODEL.parameter_names[i];
  const value = document.createElement("output");
  value.id = `value-${i}`;
  row.append(label, value);
  const input = document.createElement("input");
  input.type = "range";
  input.min = displayLower;
  input.max = displayUpper;
  input.step = (displayUpper - displayLower) / 500;
  input.value = MODEL.central[i];
  input.addEventListener("input", update);
  sliders.push(input);
  const lim = document.createElement("div");
  lim.className = "limits";
  lim.innerHTML = `<span>${displayLower.toFixed(3)}</span><span>${displayUpper.toFixed(3)}</span>`;
  wrap.append(row, input, lim);
  controls.appendChild(wrap);
}

document.getElementById("modelTag").textContent = `nφ=${MODEL.n_phi}, K=${MODEL.K}, lmax=${MODEL.l_max}`;
document.getElementById("resetButton").addEventListener("click", () => {
  sliders.forEach((s, i) => s.value = MODEL.central[i]);
  update();
});
document.getElementById("randomButton").addEventListener("click", () => {
  sliders.forEach(s => s.value = Number(s.min) + Math.random() * (Number(s.max) - Number(s.min)));
  update();
});

const svg = document.getElementById("plot");
const W = 1040, H = 680;
const MARGIN = {left: 88, right: 24, top: 30, bottom: 76};
const PW = W - MARGIN.left - MARGIN.right;
const PH = H - MARGIN.top - MARGIN.bottom;
let centralCurve = null;

function xMap(theta) {
  return MARGIN.left + (theta - 0) / 180 * PW;
}
function yMap(y, yMin, yMax) {
  const ly = Math.log10(Math.max(y, yMin));
  return MARGIN.top + (Math.log10(yMax) - ly) / (Math.log10(yMax) - Math.log10(yMin)) * PH;
}
function pathFor(values, yMin, yMax) {
  return values.map((v, i) => `${i === 0 ? "M" : "L"}${xMap(MODEL.angles_deg[i]).toFixed(2)},${yMap(v, yMin, yMax).toFixed(2)}`).join(" ");
}
function clearSvg() {
  while (svg.firstChild) svg.removeChild(svg.firstChild);
}
function line(x1, y1, x2, y2, cls, stroke="#cbd5e1", width=1) {
  const e = document.createElementNS("http://www.w3.org/2000/svg", "line");
  e.setAttribute("x1", x1); e.setAttribute("y1", y1);
  e.setAttribute("x2", x2); e.setAttribute("y2", y2);
  e.setAttribute("class", cls || "");
  e.setAttribute("stroke", stroke); e.setAttribute("stroke-width", width);
  svg.appendChild(e);
  return e;
}
function text(x, y, content, anchor="middle", size=15, rotate=null) {
  const e = document.createElementNS("http://www.w3.org/2000/svg", "text");
  e.setAttribute("x", x); e.setAttribute("y", y);
  e.setAttribute("text-anchor", anchor);
  e.setAttribute("font-size", size);
  e.setAttribute("fill", "#374151");
  if (rotate) e.setAttribute("transform", `rotate(${rotate}, ${x}, ${y})`);
  e.textContent = content;
  svg.appendChild(e);
  return e;
}
function powerOfTenText(x, y, exponent, anchor="end", size=17) {
  const e = document.createElementNS("http://www.w3.org/2000/svg", "text");
  e.setAttribute("x", x); e.setAttribute("y", y);
  e.setAttribute("text-anchor", anchor);
  e.setAttribute("font-size", size);
  e.setAttribute("fill", "#374151");
  const base = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
  base.textContent = "10";
  e.appendChild(base);
  if (exponent !== 0) {
    const power = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
    power.setAttribute("baseline-shift", "super");
    power.setAttribute("font-size", Math.round(size * 0.72));
    power.textContent = String(exponent);
    e.appendChild(power);
  }
  svg.appendChild(e);
  return e;
}
function rect(x, y, width, height, cls, rx=6) {
  const e = document.createElementNS("http://www.w3.org/2000/svg", "rect");
  e.setAttribute("x", x); e.setAttribute("y", y);
  e.setAttribute("width", width); e.setAttribute("height", height);
  e.setAttribute("rx", rx); e.setAttribute("class", cls || "");
  svg.appendChild(e);
  return e;
}
function drawLegend() {
  const x = MARGIN.left + 18, y = MARGIN.top + 18;
  rect(x, y, 225, 76, "legend-box");
  line(x + 14, y + 25, x + 60, y + 25, "", "#111827", 4.6);
  text(x + 71, y + 31, "Current L-ROM", "start", 15);
  const refLine = line(x + 14, y + 54, x + 60, y + 54, "", "#2563eb", 3);
  refLine.setAttribute("stroke-dasharray", "7 5");
  text(x + 71, y + 60, "Central parameters", "start", 15);
}
function drawPotentialInset(alpha) {
  const inset = {x: 615, y: 48, w: 385, h: 315};
  rect(inset.x, inset.y, inset.w, inset.h, "inset-box");
  text(inset.x + 17, inset.y + 27, "Scaled optical-potential terms", "start", 17);
  text(inset.x + inset.w - 16, inset.y + 27, "l=1, ch=0", "end", 13);

  const plot = {left: inset.x + 58, right: inset.x + inset.w - 17, top: inset.y + 44, bottom: inset.y + 215};
  const xPot = r => plot.left + r / 10 * (plot.right - plot.left);
  const yPot = u => plot.top + (60 - Math.max(-60, Math.min(60, u))) / 120 * (plot.bottom - plot.top);
  for (const tick of [0, 2, 4, 6, 8, 10]) {
    const xx = xPot(tick);
    line(xx, plot.top, xx, plot.bottom, "", "#e2e8f0", 0.8);
    text(xx, plot.bottom + 18, String(tick), "middle", 12);
  }
  for (const tick of [-60, -30, 0, 30, 60]) {
    const yy = yPot(tick);
    line(plot.left, yy, plot.right, yy, "", "#e2e8f0", 0.8);
    text(plot.left - 8, yy + 4, String(tick), "end", 12);
  }
  line(plot.left, plot.bottom, plot.right, plot.bottom, "", "#475569", 1);
  line(plot.left, plot.top, plot.left, plot.bottom, "", "#475569", 1);
  text((plot.left + plot.right) / 2, plot.bottom + 37, "r (fm)", "middle", 14);
  text(inset.x + 17, (plot.top + plot.bottom) / 2, "scaled U term (MeV)", "middle", 13, -90);

  const {r, terms} = opticalPotentialTerms(alpha);
  for (const term of terms) {
    const d = term.values.map((v, i) => `${i === 0 ? "M" : "L"}${xPot(r[i]).toFixed(2)},${yPot(v).toFixed(2)}`).join(" ");
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", d);
    path.setAttribute("fill", "none");
    path.setAttribute("stroke", term.color);
    path.setAttribute("stroke-width", "2.5");
    if (term.dash) path.setAttribute("stroke-dasharray", term.dash);
    svg.appendChild(path);
  }
  terms.forEach((term, i) => {
    const col = i % 2, row = Math.floor(i / 2);
    const xx = inset.x + 18 + col * 151;
    const yy = inset.y + 263 + row * 27;
    const sample = line(xx, yy, xx + 31, yy, "", term.color, 2.6);
    if (term.dash) sample.setAttribute("stroke-dasharray", term.dash);
    text(xx + 39, yy + 5, term.label, "start", 12);
  });
}
function draw(values, alpha) {
  const positive = values.filter(v => Number.isFinite(v) && v > 0);
  const cPositive = centralCurve.filter(v => Number.isFinite(v) && v > 0);
  const all = positive.concat(cPositive);
  const yMax = Math.pow(10, Math.ceil(Math.log10(Math.max(...all) * 1.2)));
  const yMin = Math.pow(10, Math.floor(Math.log10(Math.max(Math.min(...all) / 1.5, 1e-4))));
  clearSvg();
  for (const t of [0, 30, 60, 90, 120, 150, 180]) {
    const x = xMap(t);
    line(x, MARGIN.top, x, MARGIN.top + PH, "grid");
    text(x, H - 40, String(t), "middle", 18);
  }
  for (let p = Math.ceil(Math.log10(yMin)); p <= Math.floor(Math.log10(yMax)); p++) {
    const y = Math.pow(10, p);
    const yy = yMap(y, yMin, yMax);
    line(MARGIN.left, yy, MARGIN.left + PW, yy, "grid");
    powerOfTenText(MARGIN.left - 12, yy + 6, p, "end", 17);
  }
  line(MARGIN.left, MARGIN.top + PH, MARGIN.left + PW, MARGIN.top + PH, "axis", "#111827", 1.2);
  line(MARGIN.left, MARGIN.top, MARGIN.left, MARGIN.top + PH, "axis", "#111827", 1.2);
  text(MARGIN.left + PW/2, H - 10, "θ (deg)", "middle", 22);
  text(22, MARGIN.top + PH/2, "dσ/dΩ (mb/sr)", "middle", 22, -90);
  const reaction = text(MARGIN.left + 20, MARGIN.top + PH - 24, "⁴⁰Ca + n at 14.1 MeV", "start", 28);
  reaction.setAttribute("font-weight", "700");
  reaction.setAttribute("fill", "#111827");
  const ref = document.createElementNS("http://www.w3.org/2000/svg", "path");
  ref.setAttribute("d", pathFor(centralCurve, yMin, yMax));
  ref.setAttribute("class", "reference");
  svg.appendChild(ref);
  const curve = document.createElementNS("http://www.w3.org/2000/svg", "path");
  curve.setAttribute("d", pathFor(values, yMin, yMax));
  curve.setAttribute("class", "curve");
  svg.appendChild(curve);
  drawLegend();
  drawPotentialInset(alpha);
}
function formatSci(x) {
  if (!Number.isFinite(x)) return "-";
  if (x === 0) return "0";
  const p = Math.floor(Math.log10(Math.abs(x)));
  const m = x / Math.pow(10, p);
  return `${m.toFixed(2)} × 10<sup>${p}</sup>`;
}
function update() {
  const alpha = sliders.map(s => Number(s.value));
  sliders.forEach((s, i) => {
    document.getElementById(`value-${i}`).textContent = Number(s.value).toFixed(3);
  });
  const values = crossSection(alpha);
  document.getElementById("integratedValue").innerHTML = `${formatSci(integratedCrossSection(values))} mb`;
  draw(values, alpha);
}
centralCurve = crossSection(MODEL.central);
update();
</script>
